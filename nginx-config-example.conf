# Configuration Nginx pour SocialHub Global V5
# À placer dans: /etc/nginx/sites-available/socialhub
# Puis créer le lien symbolique: sudo ln -s /etc/nginx/sites-available/socialhub /etc/nginx/sites-enabled/

# ============================================
# Configuration HTTP (avant SSL)
# ============================================
# Utilisez cette configuration initialement, puis lancez Certbot pour configurer SSL

server {
    listen 80;
    listen [::]:80;
    
    # ⚠️ REMPLACER par votre vrai domaine
    server_name socialhub.votredomaine.com;

    # Logs
    access_log /var/log/nginx/socialhub-access.log;
    error_log /var/log/nginx/socialhub-error.log;

    # Limite de taille des uploads (pour vidéos/images)
    client_max_body_size 100M;
    client_body_timeout 300s;

    # Proxy vers Next.js
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        
        # Headers WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Headers standards
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Désactiver le cache pour les requêtes upgrade (WebSocket)
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts pour les requêtes longues (uploads)
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Cache pour les fichiers statiques Next.js
    location /_next/static {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        
        # Cache agressif pour les assets statiques
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, immutable, max-age=31536000";
        
        # Compression
        gzip on;
        gzip_types text/css application/javascript application/json;
        gzip_comp_level 6;
    }

    # Assets publics Next.js
    location /public {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        
        # Cache pour les fichiers publics
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Health check endpoint (optionnel)
    location /api/health {
        proxy_pass http://localhost:3000;
        access_log off;
    }
}

# ============================================
# Configuration HTTPS (après Certbot)
# ============================================
# Certbot ajoutera automatiquement la configuration SSL
# et redirigera le trafic HTTP vers HTTPS

# La configuration ressemblera à ceci après Certbot:
#
# server {
#     listen 443 ssl http2;
#     listen [::]:443 ssl http2;
#     server_name socialhub.votredomaine.com;
#
#     ssl_certificate /etc/letsencrypt/live/socialhub.votredomaine.com/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/socialhub.votredomaine.com/privkey.pem;
#     include /etc/letsencrypt/options-ssl-nginx.conf;
#     ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
#
#     # ... reste de la configuration identique ...
# }
#
# server {
#     listen 80;
#     server_name socialhub.votredomaine.com;
#     return 301 https://$server_name$request_uri;
# }

# ============================================
# Notes importantes
# ============================================
# 
# 1. Remplacer "socialhub.votredomaine.com" par votre vrai domaine
# 2. Vérifier que Next.js tourne sur le port 3000
# 3. Tester la config: sudo nginx -t
# 4. Recharger Nginx: sudo systemctl reload nginx
# 5. Configurer SSL: sudo certbot --nginx -d socialhub.votredomaine.com
#

